// Minimal sparkline SVG
const Sparkline = ({ data, color = "#3B82F6", height = 32 }) => {
  if (!data || data.length < 2) return null;
  const max = Math.max(...data, 1);
  const min = Math.min(...data);
  const w = 80, h = height;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / (max - min || 1)) * (h - 4) - 2;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="overflow-visible">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

// Simple bar chart for cost by service

// Trend chart (Dashboard)
const TrendChart = ({ data }) => {
  const actualPts = data.filter(d => d.actual);
  const forecastPts = data.filter(d => d.forecast);
  const all = [...actualPts.map(d => d.actual), ...forecastPts.map(d => d.forecast)];
  const max = Math.max(...all) * 1.1;
  const W = 640, H = 80;
  const x = (i, total) => (i / (total - 1)) * W;
  const y = (v) => H - (v / max) * H + 4;
  const budgetY = y(194000);

  const actualPath = actualPts.map((d, i) => `${i === 0 ? "M" : "L"}${x(i, data.length)},${y(d.actual)}`).join(" ");
  const forecastPath = forecastPts.map((d, i) => `${i === 0 ? `M${x(actualPts.length - 1, data.length)},${y(actualPts[actualPts.length - 1].actual)} L` : "L"}${x(actualPts.length + i, data.length)},${y(d.forecast)}`).join(" ");

  const areaPath = actualPts.map((d, i) => `${i === 0 ? "M" : "L"}${x(i, data.length)},${y(d.actual)}`).join(" ") + ` L${x(actualPts.length - 1, data.length)},${H} L0,${H} Z`;

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H + 8}`} className="overflow-visible">
      <defs>
        <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3B82F6" stopOpacity="0.15" />
          <stop offset="100%" stopColor="#3B82F6" stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0.25, 0.5, 0.75, 1].map(t => (
        <line key={t} x1="0" y1={y(max * t)} x2={W} y2={y(max * t)} stroke="#1F2937" strokeWidth="1" />
      ))}
      <line x1="0" y1={budgetY} x2={W} y2={budgetY} stroke="#F59E0B" strokeWidth="1" strokeDasharray="4,4" opacity="0.5" />
      <path d={areaPath} fill="url(#tg)" />
      <path d={actualPath} fill="none" stroke="#3B82F6" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
      <path d={forecastPath} fill="none" stroke="#3B82F6" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="5,3" opacity="0.55" />
      <circle cx={x(actualPts.length - 1, data.length)} cy={y(actualPts[actualPts.length - 1].actual)} r="3.5" fill="#3B82F6" />
      <text x={x(actualPts.length - 1, data.length) + 5} y={y(actualPts[actualPts.length - 1].actual) - 6} fontSize="8" fill="#6B7280" fontFamily="monospace">Today</text>
      <text x={W - 2} y={budgetY - 4} fontSize="8" fill="#F59E0B" fontFamily="monospace" textAnchor="end" opacity="0.7">Budget/day</text>
    </svg>
  );
};

// Progress bar for KPI
const KpiBar = ({ actual, goal, dir, status }) => {
  const pct = dir === "max" ? Math.min((actual / goal) * 100, 100) : Math.min((actual / (goal * 1.5)) * 100, 100);
  const color = status === "critical" ? "#EF4444" : status === "warning" ? "#F59E0B" : "#22C55E";
  return (
    <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden mt-1.5">
      <div className="h-full rounded-full" style={{ width: `${pct}%`, background: color }} />
    </div>
  );
};

                  )}
                </div>

                <button className="w-full text-[12px] bg-gray-800 border border-gray-700 rounded px-3 py-2 text-gray-300 hover:border-gray-500 hover:text-white transition-colors">
                  Create optimization ticket →
                </button>
              </div>
            )}
          </Card>
        ))}
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("dashboard");
  const [region, setRegion] = useState("All regions");
  const [timeRange, setTimeRange] = useState("Mar 2026");
  const [alertDrawer, setAlertDrawer] = useState(null);
  const [newAlertModal, setNewAlertModal] = useState(false);
  const [alertForm, setAlertForm] = useState({ name: "", service: "EC2", threshold: "", severity: "warning" });
  const [alertSaved, setAlertSaved] = useState(false);

  const criticalCount = MOCK.alerts.filter(a => a.severity === "critical" && a.status === "open").length;

  const navItems = [
    { id: "dashboard", label: "Overview", icon: <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> },
    { id: "alerts", label: "Alerts", badge: criticalCount, icon: <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> },
    { id: "ec2", label: "EC2 Instances", icon: <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="12" y1="17" x2="12" y2="21"/></svg> },
    { id: "billing", label: "Billing", icon: <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> },
    { id: "kpi", label: "KPI Tracker", icon: <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> },
  ];

  const handleSaveAlert = () => {
    setAlertSaved(true);
    setTimeout(() => { setAlertSaved(false); setNewAlertModal(false); setAlertForm({ name: "", service: "EC2", threshold: "", severity: "warning" }); }, 1200);
  };

  const pageTitle = { dashboard: "FinOps Overview", alerts: "Alerts", ec2: "EC2 Instances", billing: "Billing / Cost Explorer", kpi: "KPI Tracker" };

  return (
    <div className="flex h-screen bg-gray-950 text-gray-300 font-sans overflow-hidden">

      {/* Sidebar */}
      <aside className="w-48 flex-shrink-0 bg-gray-950 border-r border-gray-800 flex flex-col">
        {/* Logo */}
        <div className="flex items-center gap-2.5 px-4 py-4 border-b border-gray-800">
          <div className="w-7 h-7 bg-blue-600 rounded-md flex items-center justify-center flex-shrink-0">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
          </div>
          <div>
            <div className="text-[13px] font-semibold text-gray-100 leading-tight">CloudView</div>
            <div className="text-[10px] font-mono text-gray-600">FinOps Platform</div>
          </div>
        </div>

        {/* Nav */}
        <nav className="flex-1 py-3 px-2">
          <div className="text-[9px] font-mono text-gray-700 uppercase tracking-widest px-2 py-1.5 mb-1">Navigation</div>
          {navItems.map(item => (
            <button key={item.id} onClick={() => setPage(item.id)}
              className={`w-full flex items-center justify-between px-2.5 py-2 rounded text-[12px] font-medium mb-0.5 transition-colors ${page === item.id ? "bg-blue-600/20 text-blue-300 border border-blue-800/50" : "text-gray-500 hover:text-gray-200 hover:bg-gray-800/60"}`}>
              <div className="flex items-center gap-2.5">
                <span className={page === item.id ? "text-blue-400" : "text-gray-600"}>{item.icon}</span>
                {item.label}
              </div>
              {item.badge > 0 && (
                <span className="bg-red-900 text-red-400 font-mono text-[9px] font-bold px-1.5 py-0.5 rounded">{item.badge}</span>
              )}
            </button>
          ))}
        </nav>

        {/* Status */}
        <div className="px-4 py-3 border-t border-gray-800">
          <div className="flex items-center gap-1.5">
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse" />
            <span className="font-mono text-[10px] text-gray-600">Live · synced 2m ago</span>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div className="flex-1 flex flex-col overflow-hidden">

        {/* Topbar */}
        <header className="flex items-center justify-between px-5 py-3 border-b border-gray-800 bg-gray-950 flex-shrink-0">
          <div className="flex items-center gap-3">
            <h1 className="text-[14px] font-semibold text-gray-100">{pageTitle[page]}</h1>
            {/* Filter pills */}
            <div className="flex items-center gap-2">
              <select value={region} onChange={e => setRegion(e.target.value)}
                className="bg-gray-800 border border-gray-700 rounded px-2.5 py-1 text-[11px] text-gray-400 focus:outline-none focus:border-blue-600 cursor-pointer">
                {MOCK.regions.map(r => <option key={r}>{r}</option>)}
              </select>
              <select value={timeRange} onChange={e => setTimeRange(e.target.value)}
                className="bg-gray-800 border border-gray-700 rounded px-2.5 py-1 text-[11px] text-gray-400 focus:outline-none focus:border-blue-600 cursor-pointer">
                {MOCK.timeRanges.map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
          </div>

          <div className="flex items-center gap-2">
            <span className="text-[11px] font-mono text-gray-600 mr-1">{region} · {timeRange}</span>
            <button onClick={() => setNewAlertModal(true)}
              className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-500 text-white text-[12px] font-medium rounded px-3 py-1.5 transition-colors">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              New Alert
            </button>
          </div>
        </header>

        {/* Page content */}
        <main className="flex-1 overflow-hidden">
          {page === "dashboard" && <div className="h-full overflow-y-auto"><Dashboard onAlertClick={setAlertDrawer} setPage={setPage} /></div>}
          {page === "ec2" && <EC2Page />}
          {page === "alerts" && <AlertsPage />}
          {page === "billing" && <div className="h-full overflow-y-auto"><BillingPage /></div>}
          {page === "kpi" && <div className="h-full overflow-y-auto"><KPIPage /></div>}
        </main>
      </div>

      {/* Alert detail drawer (from dashboard click) */}
      <Drawer open={!!alertDrawer} onClose={() => setAlertDrawer(null)}>
        {alertDrawer && (
          <div className="p-5 space-y-5">
            <div>
              <div className="flex items-center gap-2 mb-2">
                <Badge variant={alertDrawer.severity}>{alertDrawer.severity}</Badge>
                <Badge variant={alertDrawer.status}>{alertDrawer.status}</Badge>
              </div>
              <h2 className="text-[15px] font-semibold text-gray-100 mb-1">{alertDrawer.title}</h2>
              <div className="font-mono text-[11px] text-gray-500">{alertDrawer.id} · {alertDrawer.time}</div>
            </div>
            {alertDrawer.cost > 0 && (
              <div className="bg-red-950/40 border border-red-900/50 rounded-lg p-4">
                <div className="text-[10px] text-gray-500 uppercase tracking-wide mb-1">Cost Impact</div>
                <div className="font-mono text-xl font-semibold text-red-400">{fmt(alertDrawer.cost)}</div>
              </div>
            )}
            <div className="bg-gray-800/50 rounded-lg p-4">
              <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-2">Root Cause</div>
              <p className="text-[12px] text-gray-300 leading-relaxed">{alertDrawer.cause}</p>
            </div>
            <div className="bg-blue-950/40 border border-blue-900/50 rounded-lg p-4">
              <div className="text-[10px] font-semibold text-blue-400 uppercase tracking-wider mb-2">Recommended Actions</div>
              <div className="space-y-1.5">
                {alertDrawer.action.split(". ").filter(Boolean).map((step, i) => (
                  <div key={i} className="flex gap-2 text-[12px] text-gray-300">
                    <span className="font-mono text-blue-500 flex-shrink-0">{i + 1}.</span>
                    <span>{step.replace(/^\d\. /, "")}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="flex gap-2">
              <button className="flex-1 bg-blue-600 hover:bg-blue-500 text-white text-[12px] font-medium rounded px-3 py-2 transition-colors">Acknowledge</button>
              <button className="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 text-[12px] font-medium rounded px-3 py-2 transition-colors">Create ticket</button>
            </div>
          </div>
        )}
      </Drawer>

      {/* New Alert Modal */}
      <Modal open={newAlertModal} onClose={() => setNewAlertModal(false)}>
        <div className="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl p-6">
          <div className="flex items-center justify-between mb-5">
            <h2 className="text-[15px] font-semibold text-gray-100">Create Alert Rule</h2>
            <button onClick={() => setNewAlertModal(false)} className="text-gray-500 hover:text-gray-200 text-xl leading-none">×</button>
          </div>

          <div className="space-y-4">
            <div>
              <label className="block text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Alert Name</label>
              <input value={alertForm.name} onChange={e => setAlertForm({...alertForm, name: e.target.value})}
                placeholder="e.g. EC2 CPU > 85% for 30min"
                className="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-[13px] text-gray-200 focus:outline-none focus:border-blue-600 placeholder-gray-600" />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="block text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Service</label>
                <select value={alertForm.service} onChange={e => setAlertForm({...alertForm, service: e.target.value})}
                  className="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-[13px] text-gray-200 focus:outline-none focus:border-blue-600">
                  {["EC2", "RDS", "Lambda", "S3", "Billing"].map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Severity</label>
                <select value={alertForm.severity} onChange={e => setAlertForm({...alertForm, severity: e.target.value})}
                  className="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-[13px] text-gray-200 focus:outline-none focus:border-blue-600">
                  {["critical", "warning", "info"].map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div>
              <label className="block text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Threshold / Condition</label>
              <input value={alertForm.threshold} onChange={e => setAlertForm({...alertForm, threshold: e.target.value})}
                placeholder="e.g. Cost > ¥500K/day or CPU > 90%"
                className="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-[13px] text-gray-200 focus:outline-none focus:border-blue-600 placeholder-gray-600" />
            </div>
          </div>

          <div className="flex gap-3 mt-6">
            <button onClick={handleSaveAlert}
              className={`flex-1 text-[13px] font-semibold rounded px-4 py-2.5 transition-colors ${alertSaved ? "bg-emerald-600 text-white" : "bg-blue-600 hover:bg-blue-500 text-white"}`}>
              {alertSaved ? "✓ Alert Created" : "Create Alert"}
            </button>
            <button onClick={() => setNewAlertModal(false)}
              className="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 text-[13px] font-medium rounded px-4 py-2.5 transition-colors">
              Cancel
            </button>
          </div>
        </div>
      </Modal>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
